name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Test Node.js CLI
        run: |
          node cli.js add expense 50 Groceries "Test" --date 2024-06-01
          node cli.js add expense 30 Dining "Pizza" --date 2024-06-02
          node cli.js add earning 3000 Salary "Pay" --date 2024-06-15
          node cli.js list
          node cli.js summary --type expense
          node cli.js monthly
          node cli.js budget set Groceries 200 20
          node cli.js budget list
          node cli.js delete 1
          node cli.js budget delete Groceries

      - name: Test Python CLI
        run: |
          python3 cli.py add expense 25 Transport "Bus pass" --date 2024-07-01
          python3 cli.py add earning 500 Freelance "Design work" --date 2024-07-10
          python3 cli.py list
          python3 cli.py summary --type earning
          python3 cli.py monthly --year 2024

      - name: Test web server starts
        run: |
          timeout 5 node server.js &
          sleep 2
          kill %1 || true
